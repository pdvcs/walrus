# arch_upstream = "amd64"
# extension = "tar.gz"

# [[platforms]]
# os = "linux"
# arch = "arm64"
# os_upstream = "linux"
# arch_upstream = "arm64"
# extension = "tar.gz"

[vulnerabilities]
# golang:go 371 entries (verified 2026-07-08). OSV Go/stdlib gives first-class GO-* advisories.
cpes = ["golang:go"]
osv = { ecosystem = "Go", name = "stdlib" }
aliases = ["go", "golang", "go language", "go sdk", "golang sdk", "go lang"]
